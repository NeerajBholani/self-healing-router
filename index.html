const { useState, useCallback, useMemo, useEffect, useRef } = React;

function useIsMobile(breakpoint = 700) {
  const [mobile, setMobile] = useState(window.innerWidth < breakpoint);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth < breakpoint);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, [breakpoint]);
  return mobile;
}

function dijkstra(nodes, edges, start, goal, failedNodes) {
  const dist = {}, prev = {};
  nodes.forEach(n => { dist[n.id] = Infinity; prev[n.id] = null; });
  dist[start] = 0;
  const adj = {};
  nodes.forEach(n => adj[n.id] = []);
  edges.forEach(e => adj[e.source]?.push(e));
  const visited = new Set(), heap = [[0, start]];
  while (heap.length) {
    heap.sort((a, b) => a[0] - b[0]);
    const [d, u] = heap.shift();
    if (visited.has(u)) continue;
    visited.add(u);
    if (u === goal) break;
    for (const edge of adj[u] || []) {
      const v = edge.target;
      if (visited.has(v)) continue;
      const w = failedNodes.has(edge.source) || failedNodes.has(edge.target) ? Infinity : edge.cost;
      const nd = dist[u] + w;
      if (nd < dist[v]) { dist[v] = nd; prev[v] = u; heap.push([nd, v]); }
    }
  }
  if (dist[goal] === Infinity) return null;
  const path = []; let cur = goal;
  while (cur) { path.unshift(cur); cur = prev[cur]; }
  return { path, cost: dist[goal] };
}

function langGraphRoute(key, failedNodes) {
  const fallbacks = {
    customer_support: { Stripe:"Razorpay", Razorpay:"Stripe", Email:"SMS", SMS:"Email" },
    travel_booking: { FlightAPI:"TrainAPI", TrainAPI:"FlightAPI", HotelAPI:"HostelAPI", HostelAPI:"HotelAPI", CarAPI:"BusAPI", BusAPI:"CarAPI" },
    content_moderation: { TextMod:"ImageMod", ImageMod:"TextMod", VideoMod:"ImageMod", AutoApprove:"HumanReview", HumanReview:"AutoApprove" },
  };
  const fb = fallbacks[key] || {};
  const silent = [], handled = [], stuck = [];
  for (const id of failedNodes) {
    const f = fb[id];
    if (f && !failedNodes.has(f)) handled.push({ failed: id, fallback: f });
    else if (f && failedNodes.has(f)) silent.push({ failed: id, fallbackAlsoDown: f });
    else stuck.push(id);
  }
  return { silent, handled, stuck };
}

      { id:"TrainAPI", x:200, y:320, type:"tool" }, { id:"HotelAPI", x:380, y:120, type:"tool" },
      { id:"HostelAPI", x:380, y:320, type:"tool" }, { id:"CarAPI", x:540, y:120, type:"tool" },
      { id:"BusAPI", x:540, y:320, type:"tool" }, { id:"Payment", x:690, y:220, type:"tool" },
      { id:"Confirm", x:810, y:220, type:"goal" },
    ],
    edges: [
      { source:"Start", target:"FlightAPI", cost:0.3 }, { source:"Start", target:"TrainAPI", cost:0.5 },
      { source:"FlightAPI", target:"HotelAPI", cost:0.3 }, { source:"FlightAPI", target:"HostelAPI", cost:0.4 },
      { source:"TrainAPI", target:"HotelAPI", cost:0.3 }, { source:"TrainAPI", target:"HostelAPI", cost:0.4 },
      { source:"HotelAPI", target:"CarAPI", cost:0.3 }, { source:"HotelAPI", target:"BusAPI", cost:0.4 },
      { source:"HostelAPI", target:"CarAPI", cost:0.4 }, { source:"HostelAPI", target:"BusAPI", cost:0.3 },
      { source:"CarAPI", target:"Payment", cost:0.2 }, { source:"BusAPI", target:"Payment", cost:0.2 },
      { source:"Payment", target:"Confirm", cost:0.1 },
    ],
    presets: [
      { label:"Single failure", tools:["FlightAPI"], desc:"Both reroute to TrainAPI" },
      { label:"All transport", tools:["FlightAPI","TrainAPI"], desc:"LangGraph silent fail — SHR escalates" },
      { label:"Triple compound", tools:["FlightAPI","HotelAPI","CarAPI"], desc:"SHR finds Train→Hostel→Bus" },
    ],
  },
  content_moderation: {
    key: "content_moderation", name: "Content Moderation", subtitle: "Review Pipeline",
    nodes: [

      { id:"ImageMod", x:260, y:220, type:"tool" }, { id:"VideoMod", x:260, y:340, type:"tool" },
      { id:"ToxicityScorer", x:480, y:220, type:"tool" }, { id:"HumanReview", x:660, y:150, type:"tool" },

      { source:"Start", target:"VideoMod", cost:0.5 }, { source:"TextMod", target:"ToxicityScorer", cost:0.2 },
      { source:"ImageMod", target:"ToxicityScorer", cost:0.3 }, { source:"VideoMod", target:"ToxicityScorer", cost:0.4 },
      { source:"ToxicityScorer", target:"HumanReview", cost:0.5 }, { source:"ToxicityScorer", target:"AutoApprove", cost:0.2 },
      { source:"HumanReview", target:"Complete", cost:0.1 }, { source:"AutoApprove", target:"Complete", cost:0.1 },

function ComparisonPanel({ scenario, failedNodes }) {
  const sc = SCENARIOS[scenario];
  const shrResult = dijkstra(sc.nodes, sc.edges, sc.nodes[0].id, sc.nodes[sc.nodes.length-1].id, failedNodes);
  const lgResult = langGraphRoute(sc.key, failedNodes);
  const lgHasSilent = lgResult.silent.length > 0;
  const toolCount = sc.nodes.filter(n => n.type === "tool").length;
  const combos = Math.pow(2, toolCount);

  if (failedNodes.size === 0) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",padding:"28px 20px",textAlign:"center"}}>
      <div>
        <div style={{fontSize:24,marginBottom:10,opacity:0.12}}>⬡</div>
        <div style={{color:"#4a4d5a",fontSize:12.5,lineHeight:1.5}}>Click tools in the graph or pick a preset</div>
        <div style={{color:"#2a2d3a",fontSize:10.5,marginTop:6,fontFamily:"'DM Mono', monospace"}}>{toolCount} tools · {combos} failure combos · ~{Math.min(toolCount*2,12)} LangGraph edges</div>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10,animation:"fadeIn 0.25s ease-out"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
          {[...failedNodes].map(n => (
            <span key={n} style={{fontSize:10.5,fontFamily:"'DM Mono', monospace",color:"#ff6b6b",background:"#ff6b6b0c",padding:"2px 7px",borderRadius:4,border:"1px solid #ff6b6b15"}}>{n}</span>
          ))}
        </div>
        {failedNodes.size >= 2 && <span style={{fontSize:9.5,fontWeight:600,color:"#ffb224",background:"#ffb22408",padding:"2px 9px",borderRadius:10,border:"1px solid #ffb22418",fontFamily:"'DM Mono', monospace",letterSpacing:0.3}}>COMPOUND</span>}
      </div>

      <div style={{background:"linear-gradient(135deg,#0c1a14,#0e1612)",border:"1px solid #1a3028",borderRadius:10,padding:"13px 15px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:shrResult?"#34d399":"#ffb224",boxShadow:shrResult?"0 0 8px #34d39940":"0 0 8px #ffb22440"}} />
            <span style={{fontSize:12.5,fontWeight:600,color:"#d8dad8"}}>Self-Healing Router</span>
          </div>
          <span style={{fontSize:9.5,fontWeight:600,padding:"2px 9px",borderRadius:10,fontFamily:"'DM Mono', monospace",background:shrResult?"#34d39910":"#ffb22410",color:shrResult?"#34d399":"#ffb224",border:"1px solid "+(shrResult?"#34d39920":"#ffb22420")}}>
            {shrResult ? "REROUTED" : "ESCALATED"}
          </span>
        </div>
        <div style={{fontSize:11.5,color:"#7ebf9e",fontFamily:"'DM Mono', monospace",lineHeight:1.6}}>
          {shrResult
            ? <>{shrResult.path.join(" → ")} <span style={{color:"#3a5a48"}}>cost {shrResult.cost.toFixed(2)}</span></>
            : <>No path → LLM goal demotion <span style={{color:"#34d399"}}>· logged</span></>}
        </div>
        <div style={{marginTop:6,fontSize:10.5,color:"#2a4a3a"}}>Silent failures: <span style={{color:"#34d399",fontWeight:600}}>0</span> <span style={{opacity:0.5}}>— by construction</span></div>
      </div>

      <div style={{background:lgHasSilent?"linear-gradient(135deg,#1a0e0e,#180c0c)":"#11121a",border:"1px solid "+(lgHasSilent?"#2e1818":"#1c1e2a"),borderRadius:10,padding:"13px 15px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:lgHasSilent?"#ff6b6b":lgResult.stuck.length?"#ffb224":"#34d399",boxShadow:"0 0 8px "+(lgHasSilent?"#ff6b6b40":lgResult.stuck.length?"#ffb22440":"#34d39940")}} />
            <span style={{fontSize:12.5,fontWeight:600,color:"#7a7c88"}}>LangGraph</span>
            <span style={{fontSize:10.5,color:"#3a3c48"}}>static fallbacks</span>
          </div>
          <span style={{fontSize:9.5,fontWeight:600,padding:"2px 9px",borderRadius:10,fontFamily:"'DM Mono', monospace",
            background:lgHasSilent?"#ff6b6b10":lgResult.stuck.length?"#ffb22410":"#34d39910",
            color:lgHasSilent?"#ff6b6b":lgResult.stuck.length?"#ffb224":"#34d399",
            border:"1px solid "+(lgHasSilent?"#ff6b6b20":lgResult.stuck.length?"#ffb22420":"#34d39920")}}>
            {lgHasSilent ? "SILENT FAILURE" : lgResult.stuck.length ? "NO FALLBACK" : "HANDLED"}
          </span>
        </div>
        <div style={{fontSize:11.5,fontFamily:"'DM Mono', monospace",lineHeight:1.7}}>
          {lgResult.handled.map((h,i) => <div key={"h"+i} style={{color:"#5a5c68"}}>{h.failed} → {h.fallback} <span style={{color:"#34d399",fontSize:9.5}}>✓</span></div>)}
          {lgResult.silent.map((s,i) => <div key={"s"+i} style={{color:"#ff6b6b"}}>{s.failed} + {s.fallbackAlsoDown} both down → <span style={{fontWeight:600}}>skipped silently</span></div>)}
          {lgResult.stuck.map((s,i) => <div key={"k"+i} style={{color:"#ffb224"}}>{s} → <span style={{fontWeight:600}}>no fallback</span></div>)}
        </div>
        {lgHasSilent && <div style={{marginTop:8,fontSize:10.5,padding:"7px 10px",background:"#ff6b6b06",border:"1px solid #ff6b6b10",borderRadius:6,color:"#ff6b6ba0",lineHeight:1.5}}>
          ⚠ {lgResult.silent.length} silent failure{lgResult.silent.length>1?"s":""}. Task appears complete but step was skipped.
        </div>}
      </div>

      {failedNodes.size >= 2 && lgHasSilent && (
        <div style={{fontSize:10.5,color:"#ffb224a0",fontFamily:"'DM Mono', monospace",textAlign:"center",padding:"9px 12px",background:"#ffb22406",borderRadius:8,lineHeight:1.5,border:"1px solid #ffb22410"}}>
          LangGraph codes ~{Math.min(toolCount*2,12)} single-failure edges. Dijkstra covers all {combos} combinations.
        </div>
      )}
    </div>
  );
}

function LogEntry({ entry, index }) {
  const colors = { reroute:"#ffb224", escalate:"#ff6b6b", restore:"#34d399", reset:"#4a4d5a" };
  const icons = { reroute:"↻", escalate:"⬆", restore:"✓", reset:"○" };
  return (
    <div style={{display:"flex",gap:7,alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid #ffffff04",fontFamily:"'DM Mono', monospace",fontSize:10.5,animation:"slideUp 0.2s ease-out"}}>
      <span style={{color:"#2a2d3a",minWidth:16,textAlign:"right",fontSize:9.5}}>{String(index+1).padStart(2,"0")}</span>
      <span style={{color:colors[entry.type],fontSize:11,minWidth:12}}>{icons[entry.type]}</span>
      <span style={{color:"#5a5d6a",flex:1,lineHeight:1.4}}>{entry.message}</span>
    </div>
  );
}

function App() {
  const [scenario, setScenario] = useState("customer_support");
  const [failedNodes, setFailedNodes] = useState(new Set());
  const [log, setLog] = useState([]);
  const [pulseNode, setPulseNode] = useState(null);
  const logRef = useRef(null);

  const sc = SCENARIOS[scenario];
  const result = useMemo(() => dijkstra(sc.nodes, sc.edges, sc.nodes[0].id, sc.nodes[sc.nodes.length-1].id, failedNodes), [sc, failedNodes]);
  const pathSet = useMemo(() => new Set(result ? result.path : []), [result]);
  const pathEdges = useMemo(() => {
    if (!result) return new Set();
    const s = new Set();
    for (let i = 0; i < result.path.length - 1; i++) s.add(result.path[i] + "->" + result.path[i+1]);
    return s;
  }, [result]);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log]);
  useEffect(() => {
    if (!result) { setPulseNode(null); return; }
    let i = 0;
    const iv = setInterval(() => { if (i < result.path.length) { setPulseNode(result.path[i]); i++; } else { setPulseNode(null); clearInterval(iv); } }, 200);
    return () => { clearInterval(iv); setPulseNode(null); };
  }, [result ? result.path.join(",") : ""]);

  const toggleNode = useCallback(nodeId => {
    const node = sc.nodes.find(n => n.id === nodeId);
    if (node.type !== "tool") return;
    setFailedNodes(prev => {
      const next = new Set(prev);
      if (next.has(nodeId)) { next.delete(nodeId); setLog(l => [...l, { type:"restore", message:`${nodeId} restored` }]); }
      else {
        next.add(nodeId);
        const r = dijkstra(sc.nodes, sc.edges, sc.nodes[0].id, sc.nodes[sc.nodes.length-1].id, next);
        setLog(l => [...l, r ? { type:"reroute", message:`${nodeId} failed → ${r.path.join(" → ")} (${r.cost.toFixed(2)})` } : { type:"escalate", message:`${nodeId} failed → NO PATH → LLM escalation` }]);
      }
      return next;
    });
  }, [sc]);

  const runPreset = useCallback(tools => {
    const next = new Set();
    const newLogs = [];
    tools.forEach(t => {
      next.add(t);
      const r = dijkstra(sc.nodes, sc.edges, sc.nodes[0].id, sc.nodes[sc.nodes.length-1].id, next);
      newLogs.push(r ? { type:"reroute", message:`${t} failed → ${r.path.join(" → ")} (${r.cost.toFixed(2)})` } : { type:"escalate", message:`${t} failed → NO PATH → LLM escalation` });
    });
    setFailedNodes(next);
    setLog(l => [...l, ...newLogs]);
  }, [sc]);

  const resetAll = useCallback(() => { setFailedNodes(new Set()); setLog(l => [...l, { type:"reset", message:"All tools restored" }]); }, []);
  const switchScenario = useCallback(key => { setScenario(key); setFailedNodes(new Set()); setLog([]); }, []);
  const toolNodes = sc.nodes.filter(n => n.type === "tool");
  const reroutes = log.filter(l => l.type === "reroute").length;
  const escalations = log.filter(l => l.type === "escalate").length;
  const isMobile = useIsMobile();

  return (
    <div style={{background:"#0a0a0f",minHeight:"100vh"}}>
      <div style={{maxWidth:1080,margin:"0 auto",padding:isMobile?"16px 12px 16px":"28px 28px 20px"}}>

        <div style={{marginBottom:isMobile?16:22}}>
          <div style={{display:"flex",alignItems:isMobile?"flex-start":"center",gap:isMobile?8:12,marginBottom:5,flexDirection:isMobile?"column":"row"}}>
            <h1 style={{fontSize:isMobile?18:21,fontWeight:700,color:"#f0f0f2",letterSpacing:-0.5}}>Self-Healing Router</h1>
            <a href="https://arxiv.org/abs/2603.01548" target="_blank" rel="noopener" style={{fontSize:10,color:"#4a4d5a",fontFamily:"'DM Mono', monospace",textDecoration:"none",padding:"2px 7px",borderRadius:4,border:"1px solid #1e2030",background:"#12131a"}}>arXiv:2603.01548</a>
          </div>
          <p style={{fontSize:12.5,color:"#4a4d5a",lineHeight:1.5,maxWidth:600}}>
            Click tools to toggle failures, or use presets to explore compound failure scenarios.
          </p>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:2,marginBottom:14,background:"#0e0f16",borderRadius:8,padding:3,width:isMobile?"100%":"fit-content",overflowX:isMobile?"auto":"visible"}}>
          {Object.entries(SCENARIOS).map(([key, val]) => (
            <button key={key} onClick={() => switchScenario(key)} style={{
              background: scenario === key ? "#1a1c28" : "transparent",
              border: "none", color: scenario === key ? "#d8dae0" : "#3a3d4a",
              padding:isMobile?"6px 12px":"6px 15px", borderRadius:6, cursor:"pointer", fontSize:isMobile?11:12,
              fontWeight: scenario === key ? 600 : 400, fontFamily:"inherit", transition:"all 0.2s",
              whiteSpace:"nowrap", flexShrink:0,
            }}>{val.name}</button>
          ))}
        </div>

        <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
          {sc.presets.map((p, i) => {
            const lgR = langGraphRoute(sc.key, new Set(p.tools));
            const hasSilent = lgR.silent.length > 0;
            const isActive = p.tools.length === failedNodes.size && p.tools.every(t => failedNodes.has(t));
            return (
              <button key={i} onClick={() => runPreset(p.tools)} title={p.desc} style={{
                background: isActive ? (hasSilent ? "#1a0f0f" : "#0f1a14") : "#12131a",
                border: "1px solid " + (isActive ? (hasSilent ? "#ff6b6b22" : "#34d39922") : "#1c1e2a"),
                color: isActive ? (hasSilent ? "#ff8a8a" : "#6ee7a8") : "#4a4d5a",
                padding:"5px 11px", borderRadius:6, cursor:"pointer", fontSize:11,
                fontWeight: isActive ? 600 : 400, fontFamily:"inherit", transition:"all 0.2s",
                display:"flex", alignItems:"center", gap:5,
              }}>
                {hasSilent && <span style={{width:5,height:5,borderRadius:"50%",background:isActive?"#ff6b6b":"#ffb224"}} />}
                {p.label}
                <span style={{color:"#2a2d3a",fontSize:9.5,fontFamily:"'DM Mono', monospace"}}>({p.tools.length})</span>
              </button>
            );
          })}
          <div style={{flex:1}} />
          <button onClick={resetAll} style={{background:"transparent",border:"1px solid #1c1e2a",color:"#3a3d4a",padding:"5px 12px",borderRadius:6,cursor:"pointer",fontSize:10.5,fontFamily:"inherit"}}>Reset</button>
        </div>

        <div style={{display:"flex",gap:14,flexDirection:isMobile?"column":"row"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{background:"#0e0f16",borderRadius:12,border:"1px solid #1a1c28",padding:isMobile?"6px 8px 2px":"10px 14px 6px",marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:isMobile?"flex-start":"center",marginBottom:4,padding:"0 2px",flexDirection:isMobile?"column":"row",gap:isMobile?4:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:isMobile?11:12,fontWeight:600,color:"#8a8d98"}}>{sc.name}</span>
                  <span style={{fontSize:10.5,color:"#2a2d3a"}}>·</span>
                  <span style={{fontSize:10.5,color:"#3a3d4a"}}>{sc.subtitle}</span>
                </div>
                <div style={{display:"flex",gap:12,fontSize:10.5,fontFamily:"'DM Mono', monospace",alignItems:"center"}}>
                  <span><span style={{color:failedNodes.size > 0 ? "#ffb224" : "#34d399",fontWeight:500}}>{toolNodes.length - failedNodes.size}</span><span style={{color:"#2a2d3a"}}>/{toolNodes.length}</span></span>
                  <span style={{width:1,height:10,background:"#1a1c28"}} />
                  {result ? <span style={{color:"#34d399",fontWeight:500}}>{result.cost.toFixed(2)}</span> : <span style={{color:"#ff6b6b",fontWeight:500}}>—</span>}
                  <span style={{width:1,height:10,background:"#1a1c28"}} />
                  {result
                    ? <span style={{color:"#34d399",fontSize:9.5,fontWeight:600}}>ROUTED</span>
                    : failedNodes.size > 0 ? <span style={{color:"#ff6b6b",fontSize:9.5,fontWeight:600,animation:"escalateBlink 1.5s ease-in-out infinite"}}>ESCALATE</span>
                    : <span style={{color:"#34d399",fontSize:9.5,fontWeight:600}}>ROUTED</span>}
                </div>
              </div>
              {isMobile && <div style={{fontSize:9,color:"#2a2d3a",textAlign:"center",padding:"2px 0 4px",fontFamily:"'DM Mono', monospace"}}>← swipe to explore graph →</div>}
              <div style={{overflowX:isMobile?"auto":"visible",WebkitOverflowScrolling:"touch"}}>
                <div style={{minWidth:isMobile?600:"auto"}}>

              <svg viewBox="0 0 880 440" style={{width:"100%",height:"auto",display:"block"}}>
                <defs>
                  <marker id="mA" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="6" markerHeight="4.5" orient="auto-start-reverse"><path d="M0 0L10 4L0 8z" fill="#34d399" /></marker>
                  <marker id="mD" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="6" markerHeight="4.5" orient="auto-start-reverse"><path d="M0 0L10 4L0 8z" fill="#1a1c28" /></marker>
                  <marker id="mX" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="6" markerHeight="4.5" orient="auto-start-reverse"><path d="M0 0L10 4L0 8z" fill="#ff6b6b18" /></marker>
                  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                  <filter id="fglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>

                {sc.edges.map((edge, i) => {
                  const src = sc.nodes.find(n => n.id === edge.source);
                  const tgt = sc.nodes.find(n => n.id === edge.target);
                  const isOn = pathEdges.has(edge.source + "->" + edge.target);
                  const isDead = failedNodes.has(edge.source) || failedNodes.has(edge.target);
                  const dy = tgt.y - src.y;
                  return (
                    <g key={i}>
                      <line x1={src.x} y1={src.y} x2={tgt.x} y2={tgt.y}
                        stroke={isDead ? "#ff6b6b0e" : isOn ? "#34d399" : "#14161e"}
                        strokeWidth={isOn ? 2 : 0.6}
                        markerEnd={isDead ? "url(#mX)" : isOn ? "url(#mA)" : "url(#mD)"}
                        style={isOn ? {filter:"url(#glow)"} : {}} />
                      {isOn && <line x1={src.x} y1={src.y} x2={tgt.x} y2={tgt.y} stroke="#34d399" strokeWidth={1.5} strokeDasharray="4 16" style={{animation:"flowDash 0.8s linear infinite"}} />}
                      <text x={(src.x+tgt.x)/2+(Math.abs(dy)>10?-14:0)} y={(src.y+tgt.y)/2+(Math.abs(dy)<10?-10:3)}
                        fill={isDead?"#ff6b6b10":isOn?"#34d39945":"#181a22"} fontSize={8} fontFamily="'DM Mono', monospace" textAnchor="middle">
                        {isDead ? "∞" : edge.cost.toFixed(1)}
                      </text>
                    </g>
                  );
                })}

                {sc.nodes.map(node => {
                  const isFailed = failedNodes.has(node.id);
                  const isOn = pathSet.has(node.id);
                  const isPulse = pulseNode === node.id;
                  const isClick = node.type === "tool";
                  const isTerm = node.type === "entry" || node.type === "goal";
                  const r = isTerm ? 26 : 22;
                  let fill = "#0d0e16", stroke = "#1c1e28", tc = "#3a3d4a";
                  if (isFailed) { fill = "#140a0a"; stroke = "#ff6b6b"; tc = "#ff6b6b"; }
                  else if (isOn) { fill = "#0a1812"; stroke = "#34d399"; tc = "#34d399"; }
                  if (isTerm && isOn) { tc = "#34d399"; stroke = "#34d399"; }
                  else if (isTerm) { tc = "#5a5d6a"; stroke = "#282a3a"; }
                  return (
                    <g key={node.id} onClick={() => isClick && toggleNode(node.id)} style={{cursor:isClick?"pointer":"default"}}>
                      {isClick && <circle cx={node.x} cy={node.y} r={36} fill="transparent" stroke="none" />}
                      {isOn && !isFailed && isPulse && <circle cx={node.x} cy={node.y} r={r+8} fill="none" stroke="#34d39928" strokeWidth={1.5} style={{animation:"pulseRing 0.5s ease-out"}} />}
                      {isOn && !isFailed && <circle cx={node.x} cy={node.y} r={r+5} fill="none" stroke="#34d3990c" strokeWidth={1} />}
                      {isFailed && <circle cx={node.x} cy={node.y} r={r+5} fill="none" stroke="#ff6b6b08" strokeWidth={1} />}
                      <circle cx={node.x} cy={node.y} r={r} fill={fill} stroke={stroke}
                        strokeWidth={isFailed||isOn?1.5:0.5}
                        style={isFailed?{filter:"url(#fglow)"}:isOn?{filter:"url(#glow)"}:{}} />
                      {!isFailed
                        ? <text x={node.x} y={node.y+1} textAnchor="middle" dominantBaseline="middle" fill={tc}
                            fontSize={node.id.length>11?7:node.id.length>7?8.5:10}
                            fontWeight={isOn?600:400} fontFamily="'DM Sans', sans-serif">{node.id}</text>
                        : <text x={node.x} y={node.y+1} textAnchor="middle" dominantBaseline="middle" fill="#ff6b6b" fontSize={15} fontWeight={700}>✕</text>}
                    </g>
                  );
                })}

                {!result && failedNodes.size > 0 && (
                  <text x={440} y={418} textAnchor="middle" fill="#ff6b6b" fontSize={10.5} fontWeight={600} fontFamily="'DM Mono', monospace" style={{animation:"escalateBlink 1.5s ease-in-out infinite"}}>
                    NO PATH — LLM ESCALATION REQUIRED
                  </text>
                )}
              </svg>
                </div>
              </div>
            </div>

            <div style={{background:"#0e0f16",borderRadius:12,border:"1px solid #1a1c28",padding:15,minHeight:180}}>
              <div style={{fontSize:9.5,fontWeight:600,color:"#2a2d3a",letterSpacing:0.8,textTransform:"uppercase",marginBottom:10}}>System Comparison</div>
              <ComparisonPanel scenario={scenario} failedNodes={failedNodes} />
            </div>
          </div>

          <div style={{width:isMobile?"100%":270,display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",gap:8}}>
              {[
                { val: reroutes, label: "Reroutes", color: "#ffb224" },
                { val: escalations, label: "Escalations", color: "#ff6b6b" },
                { val: 0, label: "Silent", color: "#34d399" },
              ].map(s => (
                <div key={s.label} style={{flex:1,background:"#0e0f16",borderRadius:10,border:"1px solid #1a1c28",padding:"10px 0",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:700,color:s.color,fontFamily:"'DM Mono', monospace"}}>{s.val}</div>
                  <div style={{fontSize:9.5,color:"#3a3d4a",marginTop:1}}>{s.label}</div>
                </div>
              ))}
            </div>

            <div style={{flex:1,background:"#0e0f16",borderRadius:12,border:"1px solid #1a1c28",padding:"12px 13px 10px",display:"flex",flexDirection:"column",minHeight:isMobile?200:340}}>
              <div style={{fontSize:9.5,fontWeight:600,color:"#2a2d3a",letterSpacing:0.8,textTransform:"uppercase",marginBottom:8}}>Decision Log</div>
              <div ref={logRef} style={{flex:1,overflowY:"auto",paddingRight:3}}>
                {log.length === 0
                  ? <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#1c1e28",fontSize:10.5,fontFamily:"'DM Mono', monospace"}}>Awaiting failures…</div>
                  : log.map((e, i) => <LogEntry key={i} entry={e} index={i} />)}
              </div>
              <div style={{marginTop:8,padding:"6px 8px",background:"#34d39905",border:"1px solid #34d3990c",borderRadius:6,fontSize:9.5,color:"#34d39940",fontFamily:"'DM Mono', monospace",textAlign:"center"}}>
                Every failure → reroute or escalation. Never silent.
              </div>
            </div>
          </div>
        </div>

        <div style={{textAlign:"center",marginTop:18,paddingTop:14,borderTop:"1px solid #12131a",fontSize:isMobile?10:10.5,color:"#2a2d3a",fontFamily:"'DM Mono', monospace",display:"flex",justifyContent:"center",gap:isMobile?12:16,flexWrap:"wrap"}}>
          <a href="https://github.com/NeerajBholani/self-healing-router" target="_blank" rel="noopener" style={{color:"#3a3d4a",textDecoration:"none"}}>GitHub</a>
          <a href="https://arxiv.org/abs/2603.01548" target="_blank" rel="noopener" style={{color:"#3a3d4a",textDecoration:"none"}}>Paper</a>
          <span>Neeraj Bholani, 2026</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
